  pharaoh_mummy_legacy_5_name:0 "Legacy of Khufu"
  pharaoh_mummy_legacy_1_perk:0 "#flavor The great Queen almost toppled a nascent empire with her charisma alone.#!"
  pharaoh_mummy_legacy_2_perk:0 "#flavor Coming from far away, Ptolemy embraced Egypt as if it was his own homeland.#!"
  pharaoh_mummy_legacy_3_perk:0 "#flavor The son of Ra commanded the greatest armies of Egypt and few were able to oppose his mighty ambition.#!"
  pharaoh_mummy_legacy_4_perk:0 "#flavor For better or worse, no Ancient Egyptian will ever forget Akhenaten, the one who despised the Gods.#!"
  pharaoh_mummy_legacy_5_perk:0 "#flavor By resting forever in the Great Pyramid of Giza, Khufu found his own immortality.#!"
